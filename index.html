<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>P2P Location Bond — AR Co-location [Ginzburg-Landau TDGL]</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0a001f;
      color: #fff;
      font-family: sans-serif;
    }
    #distanceDisplay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 80px;
      font-weight: 900;
      letter-spacing: -5px;
      color: transparent;
      background: linear-gradient(45deg, #ff9eff, #7af9ff, #ffff9e);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 0 60px rgba(122, 249, 255, 0.8);
      opacity: 0.9;
      pointer-events: none;
      z-index: 9999;
      animation: pulseEffect 8s infinite;
    }
    @keyframes pulseEffect {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
      50% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
    }
    #probabilityDisplay {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      font-weight: 700;
      color: #ff1f1f;
      text-shadow: 0 0 10px rgba(255, 50, 50, 0.8);
      z-index: 9999;
      pointer-events: none;
    }
    #controlPanel {
      position: fixed;
      right: 10px;
      bottom: 10px;
      z-index: 9999;
      color: #fff;
      background: rgba(0, 0, 0, 0.75);
      padding: 12px;
      border-radius: 8px;
      max-width: 420px;
      width: 420px;
      box-sizing: border-box;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #controlPanel button {
      margin: 6px 4px 0 0;
      padding: 6px 10px;
      background: #2a1f4d;
      color: #fff;
      border: 1px solid #5a4f8d;
      border-radius: 4px;
      cursor: pointer;
    }
    #controlPanel button:hover { background: #3a2f6d; }
    #controlPanel textarea {
      width: 100%;
      height: 70px;
      box-sizing: border-box;
      margin-top: 6px;
      background: #0b1222;
      color: #fff;
      border: 1px solid #333;
      padding: 6px;
      font-size: 11px;
    }
    #statusPanel {
      position: fixed;
      left: 10px;
      bottom: 10px;
      z-index: 9999;
      color: #fff;
      background: rgba(0, 0, 0, 0.75);
      padding: 10px;
      border-radius: 8px;
      max-width: 320px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #statusPanel .row { margin-bottom: 4px; font-size: 12px; }
    #log {
      position: fixed;
      left: 10px;
      top: 10px;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.6);
      padding: 8px;
      border-radius: 8px;
      max-width: 400px;
      max-height: 180px;
      overflow: auto;
      font-size: 11px;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="probabilityDisplay">システム初期化中...</div>
  <div id="distanceDisplay">待機中...</div>

  <!-- メインARシーン。ここに堅牢化コンポーネント(bond-system)を組み込みます -->
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="colorManagement: true; precision: mediump;"
    bond-system>

    <a-entity camera gps-camera rotation-reader></a-entity>
    <a-entity id="connectionLine" line="start: 0 0 0; end: 0 0 0; color: #ff9eff; opacity: 0.9"></a-entity>
    <a-entity id="remoteTarget" visible="false"></a-entity>

  </a-scene>

  <div id="controlPanel">
    <div style="font-weight:700; margin-bottom:4px; font-size:14px;">P2P シグナリング設定</div>
    <div style="display:flex; flex-wrap:wrap; gap:4px;">
      <button id="createOfferBtn">1. Offer 生成</button>
      <button id="acceptRemoteBtn">相手のOfferからAnswer生成</button>
    </div>
    <div style="margin-top:6px;">
      <label style="font-size:11px; color:#aaa;">出力 SDP (コピーして相手に渡す)</label>
      <textarea id="sdpOut" readonly placeholder="生成するとここにSDPが出力されます"></textarea>
      <button id="copySdpOutBtn" style="width:100%; margin-top:4px;">クリップボードにコピー</button>
    </div>
    <div style="margin-top:6px;">
      <label style="font-size:11px; color:#aaa;">入力 SDP (相手から貰ったSDPを貼る)</label>
      <textarea id="sdpIn" placeholder="相手の Offer または Answer を貼り付けてください"></textarea>
      <button id="setSdpBtn" style="width:100%; margin-top:4px; background:#1f4d2a; border-color:#4f8d5a;">2. 入力 SDP を反映・確定</button>
    </div>
  </div>

  <div id="statusPanel">
    <div style="font-weight:700; margin-bottom:6px; font-size:13px; color:#7af9ff;">システムステータス</div>
    <div class="row">WebRTC Peer: <span id="pcState">未初期化</span></div>
    <div class="row">DataChannel: <span id="dcState">切断</span></div>
    <div class="row">GPS同期: <span id="gpsStatus">通信待機中</span></div>
    <div class="row">位置推定精度: ±<span id="localAcc">—</span> m</div>
  </div>

  <div id="log"></div>

  <script>
    /* -------------------------------------------------------------------------
       グローバル状態管理（安全なカプセル化とスレッドセーフなアクセスを模倣）
       ------------------------------------------------------------------------- */
    const State = {
      localPos: null,
      remotePos: null,
      filteredPos: null,
      distance: null,
      localAccuracy: 100,
      decoherenceNoise: 0,
      isingStrength: 0,
      psi: 0.8, // TDGL 初期値
      lastSent: null,
      lastReceived: null,
      pc: null,
      dc: null
    };

    /* 物理定数群 */
    const TDGL_CONFIG = {
      dt: 0.3, Gamma: 1.0, a0: 1.0, Tc: 1.0, bGL: 2.0,
      noiseSigma: 0.02, P_max: 0.5, betaP: 5.0, T0: 0.5,
      alpha_distance: 1.0 / 1000.0, alpha_noise: 1.0
    };

    function randn() {
      let u = 0, v = 0;
      while (u === 0) u = Math.random();
      while (v === 0) v = Math.random();
      return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
    }

    function calcDistance(p1, p2) {
      if (!p1 || !p2) return null;
      const R = 6371000;
      const toRad = v => v * Math.PI / 180;
      const dLat = toRad(p2.lat - p1.lat);
      const dLon = toRad(p2.lng - p1.lng);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(p1.lat)) * Math.cos(toRad(p2.lat)) * Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    document.addEventListener('DOMContentLoaded', () => {
      /* DOM 参照 */
      const distanceDisplayDOM = document.getElementById('distanceDisplay');
      const probabilityDisplayDOM = document.getElementById('probabilityDisplay');
      const sdpOut = document.getElementById('sdpOut');
      const sdpIn = document.getElementById('sdpIn');
      const pcStateDom = document.getElementById('pcState');
      const dcStateDom = document.getElementById('dcState');
      const gpsStatusDom = document.getElementById('gpsStatus');
      const localAccDom = document.getElementById('localAcc');
      const logDom = document.getElementById('log');

      function log(msg) {
        const t = new Date().toLocaleTimeString();
        logDom.innerText = `[${t}] ${msg}\n` + logDom.innerText;
      }

      function updateUIStatus() {
        pcStateDom.textContent = State.pc ? State.pc.connectionState : '未初期化';
        dcStateDom.textContent = State.dc ? State.dc.readyState : '切断';
        gpsStatusDom.textContent = State.localPos ? `${State.localPos.lat.toFixed(5)}, ${State.localPos.lng.toFixed(5)}` : 'GPS探索中';
        localAccDom.textContent = State.localAccuracy.toFixed(0);
      }

      /* -------------------------------------------------------------------------
         WebRTC コアロジック (ICEギャザリング完全同期仕様)
         ------------------------------------------------------------------------- */
      function createPeerConnection() {
        if (State.pc) return;
        
        // パブリックSTUNサーバーの最小限構成
        State.pc = new RTCPeerConnection({
          iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        });

        State.pc.ondatachannel = (evt) => {
          log('リモートからの DataChannel を検出しました');
          bindDataChannel(evt.channel);
        };

        State.pc.onconnectionstatechange = () => {
          log(`PeerConnection 状態遷移: ${State.pc.connectionState}`);
          updateUIStatus();
        };
      }

      function bindDataChannel(channel) {
        State.dc = channel;
        State.dc.onopen = () => {
          log('DataChannel が正常に確立されました。データ同期を開始します。');
          updateUIStatus();
          
          // 定期送信ループ（安全な多重起動防止付き）
          if (window.sendLoopId) clearInterval(window.sendLoopId);
          window.sendLoopId = setInterval(() => {
            if (State.dc && State.dc.readyState === 'open' && State.localPos) {
              State.dc.send(JSON.stringify({
                type: 'pos',
                pos: State.localPos,
                acc: State.localAccuracy
              }));
              State.lastSent = Date.now();
            }
          }, 2000);
        };

        State.dc.onclose = () => {
          log('DataChannel が切断されました');
          if (window.sendLoopId) clearInterval(window.sendLoopId);
          updateUIStatus();
        };

        State.dc.onmessage = (e) => {
          try {
            const data = JSON.parse(e.data);
            if (data.pos) {
              State.remotePos = data.pos;
              const remoteAcc = data.acc || 100;
              State.lastReceived = Date.now();

              // ノイズファクター計算
              const maxAccuracy = 50;
              const accuracyFactor = Math.min(1, (State.localAccuracy + remoteAcc) / (2 * maxAccuracy));
              const distanceFactor = Math.min(1, (State.distance || 0) / 100000);
              State.decoherenceNoise = Math.max(accuracyFactor, distanceFactor);
              State.isingStrength = Math.max(0, 1 - State.decoherenceNoise);

              // フィルター処理
              const smoothing = 0.1 + State.isingStrength * 0.5;
              if (!State.filteredPos) {
                State.filteredPos = { lat: State.remotePos.lat, lng: State.remotePos.lng };
              } else {
                State.filteredPos.lat = State.filteredPos.lat * (1 - smoothing) + State.remotePos.lat * smoothing;
                State.filteredPos.lng = filteredPos.lng * (1 - smoothing) + State.remotePos.lng * smoothing;
              }
              if (State.localPos) {
                State.distance = calcDistance(State.localPos, State.filteredPos);
              }
            }
          } catch (err) {
            console.error('パケットパースエラー:', err);
          }
        };
      }

      // ICE Candidates の収集完了をプロミスで完全に保証する内部関数
      function waitIceGatheringComplete(pcInstance) {
        return new Promise(resolve => {
          if (pcInstance.iceGatheringState === 'complete') return resolve();
          function listener() {
            if (pcInstance.iceGatheringState === 'complete') {
              pcInstance.removeEventListener('icegatheringstatechange', listener);
              resolve();
            }
          }
          pcInstance.addEventListener('icegatheringstatechange', listener);
        });
      }

      /* シグナリングボタンの実装 */
      document.getElementById('createOfferBtn').addEventListener('click', async () => {
        try {
          createPeerConnection();
          bindDataChannel(State.pc.createDataChannel('bond'));
          
          log('Offer を生成中... (ICE経路収集中)');
          const offer = await State.pc.createOffer();
          await State.pc.setLocalDescription(offer);
          
          await waitIceGatheringComplete(State.pc);
          sdpOut.value = JSON.stringify(State.pc.localDescription);
          log('完全な Offer SDP の生成に成功しました。文字列を相手へ共有してください。');
          updateUIStatus();
        } catch (err) {
          log(`Error: ${err.message}`);
        }
      });

      document.getElementById('acceptRemoteBtn').addEventListener('click', async () => {
        try {
          const raw = sdpIn.value;
          if (!raw) return alert('入力欄に相手の Offer を貼り付けてください');
          const offer = JSON.parse(raw);
          
          createPeerConnection();
          await State.pc.setRemoteDescription(offer);
          log('リモートの Offer を受理。Answer を構成中...');
          
          const answer = await State.pc.createAnswer();
          await State.pc.setLocalDescription(answer);
          
          await waitIceGatheringComplete(State.pc);
          sdpOut.value = JSON.stringify(State.pc.localDescription);
          log('Answer SDP の生成に成功しました。相手に送り返してください。');
          updateUIStatus();
        } catch (err) {
          log(`Error: ${err.message}`);
        }
      });

      document.getElementById('setSdpBtn').addEventListener('click', async () => {
        try {
          const raw = sdpIn.value;
          if (!raw) return alert('SDPデータがありません');
          const desc = JSON.parse(raw);
          if (!State.pc) return alert('先に初期化フロー(1)を行ってください');
          
          await State.pc.setRemoteDescription(desc);
          log('リモートの SDP を確定しました。接続の確立をお待ちください。');
          updateUIStatus();
        } catch (err) {
          log(`Error: ${err.message}`);
        }
      });

      document.getElementById('copySdpOutBtn').addEventListener('click', () => {
        if (!sdpOut.value) return;
        navigator.clipboard?.writeText(sdpOut.value).then(() => log('クリップボードへコピーしました'));
      });

      /* -------------------------------------------------------------------------
         GPS 監視機構
         ------------------------------------------------------------------------- */
      if ('geolocation' in navigator) {
        navigator.geolocation.watchPosition(p => {
          State.localPos = { lat: p.coords.latitude, lng: p.coords.longitude };
          State.localAccuracy = p.coords.accuracy || 50;
          if (State.filteredPos) {
            State.distance = calcDistance(State.localPos, State.filteredPos);
          }
          updateUIStatus();
        }, err => {
          log(`GPSエラー: ${err.message}`);
        }, { enableHighAccuracy: true, maximumAge: 1000 });
      } else {
        log('この端末は Geolocation API に対応していません');
      }

      /* -------------------------------------------------------------------------
         A-Frame レンダリングループ・ライフサイクル統合（堅牢化の核心）
         ------------------------------------------------------------------------- */
      AFRAME.registerComponent('bond-system', {
        init: function() {
          this.connectionLine = document.getElementById('connectionLine');
          this.remoteTarget = document.getElementById('remoteTarget');
          log('AR 描画サブシステムが初期化されました。');
        },
        
        tick: function(time, timeDelta) {
          // 防御処理: データが不完全な場合は物理演算および描画を行わない
          if (!State.localPos || !State.filteredPos || State.distance === null) {
            return;
          }

          // 1. TDGL（時間依存ギンズブルグ-ランドウ方程式）の時間発展
          const cfg = TDGL_CONFIG;
          const T_eff = cfg.T0 + cfg.alpha_distance * State.distance + cfg.alpha_noise * State.decoherenceNoise;
          const a = cfg.a0 * (T_eff - cfg.Tc);
          
          const deterministic = -cfg.Gamma * (a * State.psi + cfg.bGL * Math.pow(State.psi, 3));
          const stochastic = cfg.noiseSigma * randn();
          
          State.psi = State.psi + cfg.dt * (deterministic + stochastic);
          if (!isFinite(State.psi)) State.psi = 0;
          State.psi = Math.max(0, Math.min(1.2, State.psi));

          // 2. UI上のテクスチャ・ステータス更新
          distanceDisplayDOM.textContent = State.distance < 1000 ? `${State.distance.toFixed(0)} m` : `${(State.distance / 1000).toFixed(1)} km`;
          
          const blockProb = cfg.P_max * Math.exp(-cfg.betaP * (State.psi * State.psi));
          probabilityDisplayDOM.textContent = `ブロック発生確率: ${(blockProb * 100).toFixed(1)}% (ψ=${State.psi.toFixed(3)})`;
          probabilityDisplayDOM.style.color = blockProb > 0.3 ? '#ff1f1f' : (blockProb > 0.1 ? '#ff9900' : '#1fff1f');

          // 3. Three.js のワールド座標同期バグ対策（Matrixの強制アップデート）
          const camEl = this.el.querySelector('[camera]');
          if (camEl && camEl.object3D && this.remoteTarget && this.remoteTarget.object3D) {
            
            // ジッターノイズを加味した位置情報をエンティティに再設定
            const maxJitter = 0.00001 * State.decoherenceNoise;
            const latJit = State.filteredPos.lat + (Math.random() * 2 - 1) * maxJitter;
            const lngJit = State.filteredPos.lng + (Math.random() * 2 - 1) * maxJitter;
            
            this.remoteTarget.setAttribute('visible', true);
            this.remoteTarget.setAttribute('gps-entity-place', `latitude:${latJit}; longitude:${lngJit}`);

            // スケール・アニメーション計算
            const baseSize = 0.5 + State.distance / 200000;
            const finalScale = Math.max(0.05, baseSize + (Math.random() * 2 - 1) * (1 - Math.min(1, State.psi)) * 0.06);
            this.remoteTarget.setAttribute('gltf-model', '#heart');
            this.remoteTarget.setAttribute('scale', `${finalScale} ${finalScale} ${finalScale}`);

            // A-Frame内部のWebGLマトリクスをフレーム描画直前に強制同期
            camEl.object3D.updateMatrixWorld(true);
            this.remoteTarget.object3D.updateMatrixWorld(true);

            const camPos = new THREE.Vector3();
            const tgtPos = new THREE.Vector3();
            camEl.object3D.getWorldPosition(camPos);
            
            try {
              this.remoteTarget.object3D.getWorldPosition(tgtPos);
            } catch (e) {
              return; // 初期生成時のマトリクス未定義例外をハンドリング
            }

            // 4. 連動線の再レンダリング
            const hue = Math.min(360, 300 + (State.distance / 100000) * 60);
            const lineOpacity = Math.max(0.05, (1 - (State.distance / 1000000)) * (1 - State.decoherenceNoise * 0.5));

            this.connectionLine.setAttribute('line', {
              start: `${camPos.x} ${camPos.y} ${camPos.z}`,
              end: `${tgtPos.x} ${tgtPos.y} ${tgtPos.z}`,
              color: `hsl(${hue}, 100%, 60%)`,
              opacity: lineOpacity
            });
          }
        }
      });
      
    });
  </script>

  <a-assets>
    <a-asset-item id="heart" src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/models/gltf/heart.glb"></a-asset-item>
  </a-assets>
</body>
</html>
